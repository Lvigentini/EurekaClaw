# EurekaLab discussion/position paper pipeline
#
# Produces a discussion paper: thesis, evidence, counterarguments,
# synthesis, implications, recommendations.

stages:
  - name: survey
    agent_role: survey
    description: "Focused literature search for evidence and counterevidence"
    inputs:
      domain: "{{brief.domain}}"
      query: "{{brief.query}}"
    depends_on: []
    gate_required: false
    max_retries: 3

  - name: ideation
    agent_role: ideation
    description: "Formulate thesis with supporting claims and key tensions"
    inputs:
      domain: "{{brief.domain}}"
    depends_on: [survey]
    gate_required: false
    max_retries: 3

  - name: direction_selection_gate
    agent_role: orchestrator
    description: "Select thesis and approve argumentative approach"
    inputs: {}
    depends_on: [ideation]
    gate_required: false
    max_retries: 3

  - name: analysis
    agent_role: analyst
    description: "Gather evidence, steel-man counterarguments, develop rebuttals, synthesize"
    inputs:
      domain: "{{brief.domain}}"
      task_type: "argument_analysis"
    depends_on: [direction_selection_gate]
    gate_required: false
    max_retries: 2

  - name: writer
    agent_role: writer
    description: "Write discussion paper with argumentative structure"
    inputs: {}
    depends_on: [analysis]
    gate_required: false
    max_retries: 3
