# EurekaLab survey paper pipeline
#
# Produces a narrative survey: taxonomy, comparison tables, trends, open problems.
# Skips theory proving — uses analyst agent for synthesis stages.

stages:
  - name: survey
    agent_role: survey
    description: "Broad literature survey across the domain"
    inputs:
      domain: "{{brief.domain}}"
      query: "{{brief.query}}"
    depends_on: []
    gate_required: false
    max_retries: 3

  - name: ideation
    agent_role: ideation
    description: "Propose taxonomy structure and identify key themes"
    inputs:
      domain: "{{brief.domain}}"
    depends_on: [survey]
    gate_required: false
    max_retries: 3

  - name: direction_selection_gate
    agent_role: orchestrator
    description: "Select survey focus and approve taxonomy"
    inputs: {}
    depends_on: [ideation]
    gate_required: false
    max_retries: 3

  - name: analysis
    agent_role: analyst
    description: "Deep analysis: categorize papers, compare methods, identify trends and gaps"
    inputs:
      domain: "{{brief.domain}}"
      task_type: "survey_analysis"
    depends_on: [direction_selection_gate]
    gate_required: false
    max_retries: 2

  - name: writer
    agent_role: writer
    description: "Write complete survey paper with taxonomy, comparison tables, and open problems"
    inputs: {}
    depends_on: [analysis]
    gate_required: false
    max_retries: 3
